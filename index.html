<!DOCTYPE html>
<html>
<head>

<link href="https://fonts.googleapis.com/css2?family=Outfit&display=swap" rel="stylesheet">
<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Outfit;
}

#myVideo {
  position: fixed;
  right: 0;
  bottom: 0;
  min-width: 100%; 
  min-height: 100%;
}

.content {
  position: absolute;
  top: 50%;
  left: 50%;
  margin-right: -50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 70px;

}


</style>
</head>
<body>

<video autoplay muted loop id="myVideo">
  <source src="https://assets.mixkit.co/videos/preview/mixkit-view-above-the-clouds-that-cover-a-large-forest-39713-large.mp4">
  Your browser does not support HTML5 video.
</video>

<div class="content">
  <h1>Coming Soon</h1>
  
</div>

</body>
</html>
